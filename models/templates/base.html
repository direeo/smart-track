<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartTrack KPI System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        header { background: #2c3e50; color: white; padding: 20px; }
        nav { background: #34495e; padding: 0; margin: 0; }
        nav a { color: white; padding: 15px 20px; text-decoration: none; display: inline-block; }
        nav a:hover { background: #1a252f; }
        main { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .container { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .error { color: #c0392b; padding: 10px; background: #fadbd8; border-left: 4px solid #c0392b; margin: 10px 0; }
        .success { color: #27ae60; padding: 10px; background: #d5f4e6; border-left: 4px solid #27ae60; margin: 10px 0; }
        .warning { color: #f39c12; padding: 10px; background: #fef5e7; border-left: 4px solid #f39c12; margin: 10px 0; }
        button { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; }
        .btn-secondary:hover { background: #7f8c8d; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th { background: #ecf0f1; padding: 12px; text-align: left; font-weight: bold; border-bottom: 2px solid #bdc3c7; }
        td { padding: 12px; border-bottom: 1px solid #ecf0f1; }
        tr:hover { background: #f9f9f9; }
        input, textarea, select { padding: 10px; margin: 5px 0; border: 1px solid #bdc3c7; border-radius: 3px; font-size: 14px; }
        input[type="submit"] { background: #3498db; color: white; cursor: pointer; }
        input[type="submit"]:hover { background: #2980b9; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        footer { text-align: center; padding: 20px; color: #7f8c8d; border-top: 1px solid #ecf0f1; margin-top: 40px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <h1>SmartTrack KPI Management System</h1>
    </header>
    {% if request.session.get('user_id') %}
    <nav>
        <a href="/{% if user %}{{ user['role'] }}{% endif %}/dashboard">Dashboard</a>
        <a href="/logout" style="float: right;">Logout</a>
    </nav>
    {% endif %}
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2024 SmartTrack KPI System. All rights reserved.</p>
    </footer>
    {% block extra_js %}{% endblock %}
</body>
</html>
