{% extends "base.html" %}
{% block title %}Add KPI — SmartTrack{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <div class="breadcrumb">
            <a href="/manager/dashboard">Dashboard</a>
            <span class="breadcrumb-sep">›</span>
            <a href="/manager/project/{{ project['id'] }}">{{ project['name'] }}</a>
            <span class="breadcrumb-sep">›</span>
            <span>Add KPI</span>
        </div>
        <h1 class="page-header-title">Add KPI</h1>
        <p class="page-header-subtitle">Project: <strong>{{ project['name'] }}</strong></p>
    </div>
    <a href="/manager/project/{{ project['id'] }}"><button class="btn-secondary">← Back</button></a>
</div>

<div class="form-card">
    <div class="form-card-header">
        <h2>KPI Details</h2>
        <p>Define the KPI and assign it to a team member.</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/manager/project/{{ project['id'] }}/set-kpi">
        <div class="form-group">
            <label for="title">KPI Title</label>
            <input type="text" id="title" name="title"
                   placeholder="e.g. Sales Revenue, Bug Fix Rate" required>
        </div>

        <div class="form-group">
            <label for="description">Description <span style="font-weight:400; color:var(--text-secondary);">(optional)</span></label>
            <textarea id="description" name="description" rows="3"
                      placeholder="What does achieving this KPI look like?"></textarea>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label for="target_value">Target Value</label>
                <input type="number" id="target_value" name="target_value"
                       step="0.01" placeholder="e.g. 100" required>
            </div>
            <div class="form-group">
                <label for="unit">Unit of Measurement</label>
                <input type="text" id="unit" name="unit"
                       placeholder="e.g. $, %, units" value="units" required>
            </div>
        </div>

        <div class="form-group">
            <label for="assigned_to">Assign to Team Member</label>
            <select id="assigned_to" name="assigned_to" required>
                <option value="">— Select a team member —</option>
                {% for member in members %}
                <option value="{{ member['id'] }}">{{ member['full_name'] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" name="deadline" required>
        </div>

        <div class="form-actions">
            <button type="submit">Create KPI</button>
            <a href="/manager/project/{{ project['id'] }}"><button type="button" class="btn-secondary">Cancel</button></a>
        </div>
    </form>
</div>

{% endblock %}
