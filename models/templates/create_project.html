{% extends "base.html" %}

{% block title %}Create Project - SmartTrack{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 30px auto;">
    <h2>Create New Project</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
        <div class="form-group">
            <label for="name">Project Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label for="team_members">Assign Team Members:</label>
            <select id="team_members" name="team_members" multiple size="5">
                {% for member in available_members %}
                <option value="{{ member['id'] }}">{{ member['full_name'] }} ({{ member['department_name'] }})</option>
                {% endfor %}
            </select>
            <small>Hold Ctrl/Cmd to select multiple members</small>
        </div>
        <button type="submit">Create Project</button>
        <a href="/manager/dashboard"><button type="button" class="btn-secondary">Cancel</button></a>
    </form>
</div>
{% endblock %}
