services:
  - type: web
    name: smarttrack-kpi
    env: python
    pythonVersion: 3.11.7
    buildCommand: pip install --upgrade setuptools wheel && pip install --no-cache-dir -r requirements.txt
    startCommand: bash start.sh
    plan: free

    envVars:
      - key: SESSION_SECRET
        generateValue: true

      - key: DATABASE_PATH
        value: /opt/render/project/src/models/smarttrack.db

    disk:
      name: smarttrack-disk
      mountPath: /opt/render/project/src/models
      sizeGB: 1
